<!DOCTYPE html>
<html lang="tr">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - {{ site_branding.site_name if site_branding else 'BestWork' }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // MD3 Deep Amethyst & Soft Lavender Palette
                        surface: {
                            DEFAULT: '#F6F2F7',
                            dim: '#E8E0EB',
                            bright: '#FDF8FF',
                            container: '#EFEAF0',
                            'container-low': '#F3EEF4',
                            'container-high': '#E9E4EA',
                            'container-highest': '#E3DEE4',
                        },
                        primary: {
                            DEFAULT: '#6750A4',
                            50: '#F6F2F7',
                            100: '#EADDFF',
                            200: '#D0BCFF',
                            300: '#B69DF8',
                            400: '#9A82DB',
                            500: '#7F67BE',
                            600: '#6750A4',
                            700: '#4F378B',
                            800: '#381E72',
                            900: '#21005D',
                            light: '#7F67BE',
                            dark: '#4F378B',
                            container: '#EADDFF',
                            'on-container': '#21005D',
                        },
                        secondary: {
                            DEFAULT: '#625B71',
                            50: '#F6F2F7',
                            100: '#E8DEF8',
                            200: '#CCC2DC',
                            300: '#B0A7C0',
                            400: '#958DA5',
                            500: '#7A7289',
                            600: '#625B71',
                            700: '#4A4458',
                            800: '#332D41',
                            900: '#1D192B',
                            container: '#E8DEF8',
                            'on-container': '#1D192B',
                        },
                        tertiary: {
                            DEFAULT: '#7D5260',
                            container: '#FFD8E4',
                            'on-container': '#31111D',
                        },
                        outline: {
                            DEFAULT: '#79747E',
                            variant: '#CAC4D0',
                        },
                        'on-surface': '#1C1B1F',
                        'on-surface-variant': '#49454F',
                        error: '#B3261E',
                        success: '#2E7D32',
                    },
                    borderRadius: {
                        'md3-xs': '4px',
                        'md3-sm': '8px',
                        'md3': '12px',
                        'md3-lg': '16px',
                        'md3-xl': '20px',
                        'md3-2xl': '28px',
                        'md3-3xl': '32px',
                        'md3-full': '999px',
                    },
                    boxShadow: {
                        'md3-1': '0 1px 3px 1px rgba(0, 0, 0, 0.08), 0 1px 2px 0 rgba(0, 0, 0, 0.04)',
                        'md3-2': '0 2px 6px 2px rgba(0, 0, 0, 0.08), 0 1px 2px 0 rgba(0, 0, 0, 0.04)',
                        'md3-3': '0 4px 8px 3px rgba(0, 0, 0, 0.08), 0 1px 3px 0 rgba(0, 0, 0, 0.08)',
                        'md3-4': '0 6px 10px 4px rgba(0, 0, 0, 0.08), 0 2px 3px 0 rgba(0, 0, 0, 0.08)',
                        'md3-5': '0 8px 12px 6px rgba(0, 0, 0, 0.08), 0 4px 4px 0 rgba(0, 0, 0, 0.06)',
                    },
                    fontFamily: {
                        'display': ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                        'body': ['Inter', 'system-ui', 'sans-serif'],
                    },
                    spacing: {
                        '18': '4.5rem',
                        '22': '5.5rem',
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        /* Premium Surface Background */
        body {
            background-color: #F6F2F7;
        }
        
        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* MD3 State Layers */
        .state-layer {
            position: relative;
            overflow: hidden;
        }
        
        .state-layer::before {
            content: '';
            position: absolute;
            inset: 0;
            background: currentColor;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .state-layer:hover::before {
            opacity: 0.08;
        }
        
        .state-layer:active::before {
            opacity: 0.12;
        }
        
        /* MD3 Filled Button */
        .btn-filled {
            background-color: #6750A4;
            color: white;
            font-weight: 600;
            padding: 0.625rem 1.5rem;
            border-radius: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 3px 1px rgba(0, 0, 0, 0.08);
        }
        
        .btn-filled:hover {
            box-shadow: 0 2px 6px 2px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }
        
        /* MD3 Outlined Button */
        .btn-outlined {
            border: 1px solid #CAC4D0;
            color: #6750A4;
            font-weight: 600;
            padding: 0.625rem 1.5rem;
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        
        .btn-outlined:hover {
            background-color: rgba(103, 80, 164, 0.08);
        }
        
        /* MD3 Tonal Button */
        .btn-tonal {
            background-color: #EADDFF;
            color: #21005D;
            font-weight: 600;
            padding: 0.625rem 1.5rem;
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        
        .btn-tonal:hover {
            box-shadow: 0 1px 3px 1px rgba(0, 0, 0, 0.08);
        }
        
        /* MD3 Card Elevation */
        .card-elevated {
            background: white;
            border-radius: 16px;
            box-shadow: 0 1px 3px 1px rgba(0, 0, 0, 0.08), 0 1px 2px 0 rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        
        .card-elevated:hover {
            box-shadow: 0 4px 8px 3px rgba(0, 0, 0, 0.08), 0 1px 3px 0 rgba(0, 0, 0, 0.08);
        }
        
        /* MD3 Filled Card */
        .card-filled {
            background: #EFEAF0;
            border-radius: 16px;
            transition: all 0.2s ease;
        }
        
        /* MD3 Outlined Card */
        .card-outlined {
            background: white;
            border: 1px solid #CAC4D0;
            border-radius: 16px;
            transition: all 0.2s ease;
        }
        
        /* Premium Input */
        .input-outlined {
            border: 1px solid #CAC4D0;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            transition: all 0.2s ease;
            background: white;
        }
        
        .input-outlined:focus {
            outline: none;
            border-color: #6750A4;
            box-shadow: 0 0 0 2px rgba(103, 80, 164, 0.1);
        }
        
        /* Pill/Chip Style */
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .chip-filled {
            background-color: #EADDFF;
            color: #21005D;
        }
        
        .chip-outlined {
            border: 1px solid #CAC4D0;
            color: #49454F;
        }
        
        /* Line clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Premium Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease forwards;
        }
        
        /* Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Gradient Primary */
        .gradient-primary {
            background: linear-gradient(135deg, #6750A4 0%, #7F67BE 100%);
        }
    </style>
    {% endblock %}
</head>
<body class="antialiased text-on-surface font-body">

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
