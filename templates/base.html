<!DOCTYPE html>
<html lang="tr">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - {{ site_branding.site_name if site_branding else 'BestWork' }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#faf5ff',
                            100: '#f3e8ff',
                            200: '#e9d5ff',
                            300: '#d8b4fe',
                            400: '#c084fc',
                            500: '#a855f7',
                            600: '#9333ea',
                            700: '#7e22ce',
                            800: '#6b21a8',
                            900: '#581c87',
                        },
                        secondary: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                        },
                        accent: {
                            50: '#ecfeff',
                            100: '#cffafe',
                            200: '#a5f3fc',
                            300: '#67e8f9',
                            400: '#22d3ee',
                            500: '#06b6d4',
                            600: '#0891b2',
                        },
                        surface: {
                            DEFAULT: '#ffffff',
                            dim: '#fefbff',
                            bright: '#fefbff',
                            container: '#f7f2fa',
                            'container-high': '#f1ecf4',
                            'container-highest': '#ebe6ee',
                        },
                    },
                    borderRadius: {
                        'md3-xs': '4px',
                        'md3-sm': '8px',
                        'md3': '12px',
                        'md3-lg': '16px',
                        'md3-xl': '20px',
                        'md3-2xl': '28px',
                        'md3-full': '999px',
                    },
                    boxShadow: {
                        'md3-1': '0 1px 2px 0 rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15)',
                        'md3-2': '0 1px 2px 0 rgba(0, 0, 0, 0.3), 0 2px 6px 2px rgba(0, 0, 0, 0.15)',
                        'md3-3': '0 4px 8px 3px rgba(0, 0, 0, 0.15), 0 1px 3px 0 rgba(0, 0, 0, 0.3)',
                        'md3-4': '0 6px 10px 4px rgba(0, 0, 0, 0.15), 0 2px 3px 0 rgba(0, 0, 0, 0.3)',
                        'md3-5': '0 8px 12px 6px rgba(0, 0, 0, 0.15), 0 4px 4px 0 rgba(0, 0, 0, 0.3)',
                    },
                    fontFamily: {
                        'display': ['Manrope', 'system-ui', 'sans-serif'],
                        'body': ['Manrope', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 50%, #fffbeb 100%);
        }
        .md3-elevation-1 { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15); }
        .md3-elevation-2 { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15); }
        .md3-elevation-3 { box-shadow: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px 0 rgba(0,0,0,0.3); }
        .gradient-primary { background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%); }
        .gradient-accent { background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%); }
        .gradient-gold { background: linear-gradient(135deg, #f59e0b 0%, #fcd34d 100%); }
    </style>
    {% endblock %}
</head>
<body class="antialiased text-gray-900 font-body">

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
